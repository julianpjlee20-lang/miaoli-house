name: Deploy to Zeabur

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zeabur CLI
        run: npm install -g zeabur

      - name: Deploy to Zeabur
        run: |
          zeabur auth login --token ${{ secrets.ZEABUR_TOKEN }}
          zeabur service redeploy miaoli-house -y
        env:
          ZEABUR_TOKEN: ${{ secrets.ZEABUR_TOKEN }}
