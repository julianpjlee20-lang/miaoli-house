version: '3.8'

services:
  # ============================================
  # Frontend - Next.js
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8090}
      - NEXT_PUBLIC_POCKETBASE_URL=${POCKETBASE_URL:-http://localhost:8090}
    depends_on:
      - pocketbase
    restart: unless-stopped
    networks:
      - app-network

  # ============================================
  # Backend - PocketBase
  # ============================================
  pocketbase:
    image: pocketbase/pocketbase:latest
    ports:
      - "8090:8090"
    volumes:
      - ./backend/pb_data:/pb_data
      - ./backend/pb_migrations:/pb_migrations
    command: serve --http=8090 --dir=/pb_data --encryptionEnv=inbucketSecret
    environment:
      - PB_SECRETS=${POCKETBASE_SECRETS}
    restart: unless-stopped
    networks:
      - app-network

  # ============================================
  # Storage - MinIO
  # ============================================
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"  # Console
    volumes:
      - ./minio/data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - app-network

  # ============================================
  # Cron - 資料更新
  # ============================================
  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    environment:
      - POCKETBASE_URL=${POCKETBASE_URL:-http://pocketbase:8090}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_BUCKET=presale-data
    depends_on:
      - pocketbase
      - minio
    restart: unless-stopped
    networks:
      - app-network

  # ============================================
  # Nginx - Reverse Proxy
  # ============================================
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - pocketbase
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
